<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAVRA 2026 – Tahmin Karşılaştırma</title>
  <script src="https://unpkg.com/parse/dist/parse.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --maroon:  #800000;
      --bg:      #f4f6fb;
      --card:    #ffffff;
      --border:  #d0d7e8;
      --muted:   #6b7a9e;
      --text:    #1a1f2e;
      --green:   #00963f;
      --red:     #c0392b;
      --gold:    #f5c518;
      --radius:  10px;
    }

    body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── HEADER ── */
    .page-header {
      background: var(--maroon);
      padding: 0.85rem 1.25rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
      position: sticky; top: 0; z-index: 50;
    }
    .page-header-left { display: flex; align-items: center; gap: 0.65rem; }
    .page-header img { height: 32px; width: auto; }
    .page-header h1 { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; letter-spacing: 0.05em; color: #fff; }
    .back-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.45rem 0.9rem;
      background: rgba(255,255,255,0.15); color: #fff;
      border: 1px solid rgba(255,255,255,0.3); border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.82rem;
      font-weight: 700; letter-spacing: 0.08em; text-decoration: none; text-transform: uppercase;
    }
    .back-btn:hover { background: rgba(255,255,255,0.25); }

    /* ── STATUS ── */
    .status-box {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; padding: 4rem 1rem; color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.95rem; letter-spacing: 0.1em;
    }
    .spinner {
      width: 34px; height: 34px; border: 3px solid var(--border);
      border-top-color: var(--maroon); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── TABS ── */
    .tabs-bar {
      background: #fff; border-bottom: 2px solid var(--border);
      padding: 0.65rem 1.25rem 0;
      overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch;
      display: none;
    }
    .tabs-bar::-webkit-scrollbar { height: 3px; }
    .tabs-bar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
    .tab-btn {
      display: inline-flex; align-items: center; gap: 0.3rem;
      padding: 0.5rem 0.9rem 0.6rem; margin-right: 0.2rem;
      background: none; border: none; border-bottom: 3px solid transparent;
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.88rem;
      font-weight: 700; letter-spacing: 0.05em; color: var(--muted);
      cursor: pointer; white-space: nowrap; transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn:hover { color: var(--maroon); }
    .tab-btn.active { color: var(--maroon); border-bottom-color: var(--maroon); }
    .tab-rank {
      font-size: 0.68rem; background: var(--maroon); color: #fff;
      border-radius: 99px; padding: 1px 5px;
    }
    .tab-btn.active .tab-rank { background: #fff; color: var(--maroon); border: 1px solid var(--maroon); }

    /* ── CONTENT ── */
    .content { max-width: 960px; margin: 0 auto; padding: 1rem 1rem 3rem; display: none; }
    .participant-panel { display: none; }
    .participant-panel.active { display: block; }

    /* ── SCORE HEADER ── */
    .score-header {
      display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
      padding: 0.9rem 1.1rem;
      background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius);
      margin-bottom: 1.1rem;
    }
    .score-header-rank {
      font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--maroon);
      min-width: 2.5rem; text-align: center; flex-shrink: 0;
    }
    .score-header-name { flex: 1; min-width: 120px; }
    .score-header-name strong {
      font-family: 'Barlow Condensed', sans-serif; font-size: 1.2rem; font-weight: 700;
      display: block;
    }
    .score-header-name small { font-size: 0.72rem; color: var(--muted); }
    .score-chips { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-left: auto; }
    .chip {
      display: flex; flex-direction: column; align-items: center;
      padding: 0.35rem 0.8rem; border-radius: 8px;
      background: var(--bg); border: 1px solid var(--border);
    }
    .chip-val { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--maroon); line-height: 1; }
    .chip-lbl { font-family: 'Barlow Condensed', sans-serif; font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    .chip.total { background: var(--maroon); border-color: var(--maroon); }
    .chip.total .chip-val, .chip.total .chip-lbl { color: #fff; }

    /* ── SECTION TITLE ── */
    .section-title {
      font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; letter-spacing: 0.06em;
      color: var(--maroon); border-bottom: 2px solid var(--maroon);
      padding-bottom: 0.25rem; margin: 1.1rem 0 0.7rem;
    }

    /* ── LEGEND ── */
    .legend {
      display: flex; gap: 1rem; flex-wrap: wrap;
      margin-bottom: 0.7rem;
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem;
      color: var(--muted); letter-spacing: 0.04em;
    }
    .legend-item { display: flex; align-items: center; gap: 0.35rem; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot-exact { background: var(--green); }
    .dot-close { background: #f39c12; }
    .dot-wrong { background: var(--red); }
    .dot-actual { background: #2980b9; }

    /* ── GROUP COMPARISON GRID ── */
    .group-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 0.7rem;
    }
    .group-card {
      background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius);
      overflow: hidden;
    }
    .group-card-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.4rem 0.75rem; background: #f9f0f0; border-bottom: 1px solid var(--border);
    }
    .gc-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; color: var(--maroon); }
    .gc-nick { font-family: 'Barlow Condensed', sans-serif; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
    .gc-pts {
      font-family: 'Bebas Neue', sans-serif; font-size: 1rem;
      background: var(--maroon); color: #fff;
      border-radius: 99px; padding: 1px 8px; min-width: 28px; text-align: center;
    }

    /* column headers */
    .group-cols {
      display: grid; grid-template-columns: 22px 1fr 1fr;
      padding: 0.25rem 0.75rem;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .group-cols span {
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.63rem;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
    }
    .group-cols span:last-child { text-align: right; }

    /* team comparison row */
    .gc-row {
      display: grid; grid-template-columns: 22px 1fr 1fr;
      align-items: center; gap: 0.3rem;
      padding: 0.28rem 0.75rem;
      border-bottom: 1px solid rgba(208,215,232,0.4);
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; font-weight: 600;
      position: relative;
    }
    .gc-row:last-child { border-bottom: none; }
    .gc-pos {
      width: 18px; height: 18px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 700; flex-shrink: 0;
    }
    .p1 { background: #f5c518; color: #0a0d14; }
    .p2 { background: #c0c0c0; color: #0a0d14; }
    .p3 { background: #cd7f32; color: #0a0d14; }
    .p4 { background: var(--border); color: var(--muted); }

    .gc-team { display: flex; align-items: center; gap: 0.3rem; }
    .gc-flag {
      width: 22px; height: 15px; object-fit: cover;
      border-radius: 2px; border: 1px solid rgba(0,0,0,0.08);
      flex-shrink: 0; background: var(--border);
    }
    .gc-flag-ph { width: 22px; height: 15px; background: var(--border); border-radius: 2px; flex-shrink: 0; }

    /* result styling */
    .gc-row.exact { background: rgba(0,150,63,0.07); }
    .gc-row.close { background: rgba(243,156,18,0.07); }
    .gc-row.wrong { background: rgba(192,57,43,0.05); }

    .gc-actual { text-align: right; }
    .gc-actual .actual-name { color: #2980b9; font-size: 0.75rem; }
    .pts-badge {
      display: inline-block;
      font-family: 'Bebas Neue', sans-serif; font-size: 0.85rem;
      border-radius: 4px; padding: 0 4px; margin-left: 0.2rem;
    }
    .pts-4 { background: #e8f8ef; color: var(--green); }
    .pts-3 { background: #fef9e7; color: #f39c12; }
    .pts-2 { background: #fef5e4; color: #e67e22; }
    .pts-1 { background: #fdf2f8; color: #8e44ad; }
    .pts-0 { background: #fdf0f0; color: var(--red); }

    /* ── KO COMPARISON ── */
    .ko-section { margin-top: 0.5rem; }
    .ko-round-block { margin-bottom: 0.85rem; }
    .ko-round-title {
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.78rem;
      font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 0.35rem;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .ko-round-pts {
      font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem;
      background: var(--maroon); color: #fff;
      border-radius: 99px; padding: 0 7px;
    }
    .ko-matches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
      gap: 0.4rem;
    }
    .ko-match-card {
      background: var(--card); border: 1.5px solid var(--border); border-radius: 8px;
      padding: 0.45rem 0.7rem; font-family: 'Barlow Condensed', sans-serif;
    }
    .ko-match-card.correct { border-color: var(--green); background: rgba(0,150,63,0.05); }
    .ko-match-card.wrong   { border-color: #e8c8c8; background: rgba(192,57,43,0.03); }
    .ko-match-card.pending { border-color: var(--border); opacity: 0.65; }
    .ko-match-num { font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.15rem; }
    .ko-prediction { display: flex; align-items: center; gap: 0.3rem; font-size: 0.82rem; font-weight: 700; }
    .ko-actual     { display: flex; align-items: center; gap: 0.3rem; font-size: 0.72rem; color: #2980b9; margin-top: 0.1rem; }
    .ko-icon { font-size: 0.8rem; flex-shrink: 0; }
    .ko-no-entry {
      text-align: center; padding: 1.5rem; color: var(--muted);
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; letter-spacing: 0.08em;
      background: var(--card); border: 1.5px dashed var(--border); border-radius: var(--radius);
    }

    /* champion + 3rd */
    .special-row {
      display: flex; gap: 0.7rem; flex-wrap: wrap; margin-top: 0.5rem;
    }
    .special-card {
      flex: 1; min-width: 160px;
      background: var(--card); border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 0.65rem 0.9rem;
    }
    .special-card.correct { border-color: var(--green); background: rgba(0,150,63,0.06); }
    .special-card.wrong   { border-color: #e8c8c8; }
    .special-card.champion { border-width: 2px; }
    .special-title {
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.7rem;
      letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
      margin-bottom: 0.3rem;
    }
    .special-pick { font-family: 'Barlow Condensed', sans-serif; font-size: 1.05rem; font-weight: 700; }
    .special-actual { font-family: 'Barlow Condensed', sans-serif; font-size: 0.8rem; color: #2980b9; margin-top: 0.15rem; }
    .special-pts {
      font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem;
      float: right; color: var(--green);
    }

    /* no-admin notice */
    .no-admin-notice {
      padding: 0.75rem 1rem; margin-bottom: 0.75rem;
      background: #fff8e1; border: 1px solid #f5c518; border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif; font-size: 0.85rem; color: #7d6000;
      letter-spacing: 0.04em;
    }

    @media (max-width: 540px) {
      .group-grid { grid-template-columns: repeat(2, 1fr); }
      .ko-matches-grid { grid-template-columns: repeat(2, 1fr); }
      .score-header { flex-wrap: wrap; }
      .page-header h1 { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

  <header class="page-header">
    <div class="page-header-left">
      <img src="images/TAClogo.png" alt="TAC" />
      <h1>MAVRA 2026 – MAVRACILARIN TAHMİNLERİ</h1>
    </div>
    <a href="index.html" class="back-btn">Ana Sayfa</a>
  </header>

  <div id="status-box" class="status-box">
    <div class="spinner"></div>
    <p>Lütfen bekleyin. Yükleniyor…</p>
  </div>

  <div id="tabs-bar" class="tabs-bar"></div>
  <div id="content" class="content"></div>

<script>
'use strict';

Parse.initialize("burDaliPLstPolKtA7ozgIUXgvgIAbsEDDRRaall","nlAyYXfDQpZY7cMixJCodO0rGpOrt9iAfjKfvYLd");
Parse.serverURL = "https://burda-aaa-01.herokuapp.com/parse";

const GROUP_KEYS = ['A','B','C','D','E','F','G','H','I','J','K','L'];
const GROUP_NICKNAMES = {
  A:'ROBESON',B:'KARAN',C:'MORRIS',D:'NACAR',E:'WELLEN',F:'BAKKALOGLU',
  G:'SEVER',H:'ALLEN',I:'HALIL',J:'TISCHER',K:'MCCAIN',L:'KARAMIK'
};
const KO_ROUNDS        = ['R32','R16','QF','SF','Final'];
const KO_ROUND_LABELS  = {R32:'Son 32',R16:'Son 16',QF:'Çeyrek Final',SF:'Yarı Final',Final:'Final'};
const KO_ROUND_COUNTS  = [16,8,4,2,1];
const KO_PTS_MAP       = {R32:1,R16:2,QF:4,SF:8,Final:16,ThirdPlace:16,Champion:32};

const R16_FIXTURES = [
  ["1E","3A"],["1I","3C"],["2A","2B"],["1F","2C"],
  ["2K","2L"],["1H","2J"],["1D","3B"],["1G","3E"],
  ["1C","2F"],["2E","2I"],["1A","3K"],["1L","3H"],
  ["1J","2H"],["2D","2G"],["1B","3G"],["1K","3I"]
];

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function flagSrc(name){
  if(!name) return null;
  return 'images/flags/'+name.toLowerCase()
    .replace(/['\u2019]/g,'').replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')+'.gif';
}

function flagEl(name, cls='gc-flag'){
  const src = flagSrc(name);
  if(!src) return `<span class="gc-flag-ph"></span>`;
  return `<img src="${src}" class="${cls}" alt="${esc(name)}" onerror="this.style.display='none'">`;
}

function parseGroupRec(rec){
  const r={};
  GROUP_KEYS.forEach(k=>{
    r[k]=[
      rec.get(`Group_${k}_1st`)||'',rec.get(`Group_${k}_2nd`)||'',
      rec.get(`Group_${k}_3rd`)||'',rec.get(`Group_${k}_4th`)||''
    ].filter(Boolean);
  });
  return r;
}

function parseKoRec(rec){
  const r={ThirdPlace:rec.get('ThirdPlace_Winner')||'',Champion:rec.get('Champion')||''};
  KO_ROUNDS.forEach((rn,ri)=>{
    r[rn]=[];
    for(let m=1;m<=KO_ROUND_COUNTS[ri];m++) r[rn].push(rec.get(`${rn}_M${m}_Winner`)||'');
  });
  return r;
}

function groupPts(userPos, adminPos){
  // Points for a single team in a group: 4 - |userPos - adminPos|, min 0
  const diff = Math.abs(userPos - adminPos);
  return Math.max(0, 4 - diff);
}

function calcGroupScore(userRanks, adminRanks){
  let total=0;
  GROUP_KEYS.forEach(k=>{
    const u=userRanks[k]||[], a=adminRanks[k]||[];
    u.forEach((team,ui)=>{
      const ai=a.indexOf(team);
      if(ai===-1) return;
      total+=groupPts(ui,ai);
    });
  });
  return total;
}

function calcKoScore(userKo, adminKo){
  if(!adminKo) return 0;
  let total=0;
  KO_ROUNDS.forEach(rn=>{
    const u=userKo[rn]||[], a=adminKo[rn]||[];
    a.forEach((aw,i)=>{ if(aw && u[i] && aw===u[i]) total+=KO_PTS_MAP[rn]; });
  });
  if(adminKo.ThirdPlace && userKo.ThirdPlace===adminKo.ThirdPlace) total+=KO_PTS_MAP.ThirdPlace;
  if(adminKo.Champion   && userKo.Champion===adminKo.Champion)     total+=KO_PTS_MAP.Champion;
  return total;
}

async function fetchWithRetry(fn, retries=3, delay=2000){
  for(let i=1;i<=retries;i++){
    try{ return await fn(); }
    catch(e){ if(i===retries||e.code!==100) throw e; await new Promise(r=>setTimeout(r,delay)); }
  }
}

async function load(){
  let groupRecs, koRecs, adminGroupRec, adminKoRec;
  try{
    [groupRecs,koRecs,adminGroupRec,adminKoRec] = await fetchWithRetry(async()=>{
      const gQ=new Parse.Query('FIFA2026');
      gQ.notEqualTo('Name','FIFA2026ADMIN'); gQ.limit(1000); gQ.ascending('createdAt');
      const kQ=new Parse.Query('FIFA2026_KO');
      kQ.notEqualTo('Name','FIFA2026ADMIN'); kQ.limit(1000);
      const gaQ=new Parse.Query('FIFA2026'); gaQ.equalTo('Name','FIFA2026ADMIN'); gaQ.limit(1);
      const kaQ=new Parse.Query('FIFA2026_KO'); kaQ.equalTo('Name','FIFA2026ADMIN'); kaQ.limit(1);
      const [g,k,ga,ka]=await Promise.all([gQ.find(),kQ.find(),gaQ.find(),kaQ.find()]);
      return [g,k,ga[0]||null,ka[0]||null];
    });
  } catch(e){
    document.getElementById('status-box').innerHTML=
      `<div style="color:var(--maroon);font-family:'Barlow Condensed',sans-serif;text-align:center;">
        ⚠️ Yüklenirken hata: ${esc(e.message)}<br>
        <a href="" style="color:var(--maroon)">Tekrar dene</a></div>`;
    return;
  }

  const adminGR = adminGroupRec ? parseGroupRec(adminGroupRec) : null;
  const adminKO = adminKoRec    ? parseKoRec(adminKoRec)       : null;

  // Index KO by email
  const koByEmail={};
  koRecs.forEach(r=>{ const e=(r.get('Email')||'').toLowerCase().trim(); if(e) koByEmail[e]=r; });

  // Build participants
  const participants = groupRecs.map(rec=>{
    const email = (rec.get('Email')||'').toLowerCase().trim();
    const groupRanks = parseGroupRec(rec);
    const groupScore = adminGR ? calcGroupScore(groupRanks, adminGR) : 0;
    const koRec = koByEmail[email];
    const koData = koRec ? parseKoRec(koRec) : null;
    const koScore = (koData&&adminKO) ? calcKoScore(koData,adminKO) : 0;
    return { name:rec.get('Name')||'—', email, groupRanks, koData, groupScore, koScore,
             total:groupScore+koScore };
  });

  participants.sort((a,b)=>b.total-a.total);
  let cr=1;
  participants.forEach((p,i)=>{
    if(i===0) p.rank=1;
    else if(p.total===participants[i-1].total) p.rank=participants[i-1].rank;
    else { cr++; p.rank=cr; }
  });

  render(participants, adminGR, adminKO);
}

function render(participants, adminGR, adminKO){
  document.getElementById('status-box').style.display='none';
  const tabsBar=document.getElementById('tabs-bar');
  const content=document.getElementById('content');
  tabsBar.style.display='block';
  content.style.display='block';

  participants.forEach((p,idx)=>{
    const medal = p.rank===1?'🥇':p.rank===2?'🥈':p.rank===3?'🥉':'';
    const btn=document.createElement('button');
    btn.className='tab-btn'+(idx===0?' active':'');
    btn.dataset.idx=idx;
    btn.innerHTML=`${medal?medal+' ':''}${esc(p.name)} <span class="tab-rank">${p.rank}</span>`;
    btn.addEventListener('click',()=>switchTab(idx));
    tabsBar.appendChild(btn);

    const panel=document.createElement('div');
    panel.className='participant-panel'+(idx===0?' active':'');
    panel.id=`panel-${idx}`;
    panel.innerHTML=buildPanel(p, adminGR, adminKO);
    content.appendChild(panel);
  });
}

function switchTab(idx){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));
  document.querySelectorAll('.participant-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  document.getElementById('content').scrollTop=0;
  window.scrollTo({top:0,behavior:'smooth'});
}

function buildPanel(p, adminGR, adminKO){
  const medal=p.rank===1?'🥇':p.rank===2?'🥈':p.rank===3?'🥉':`${p.rank}.`;
  let h='';

  // Score header
  h+=`<div class="score-header">
    <div class="score-header-rank">${medal}</div>
    <div class="score-header-name">
      <strong>${esc(p.name)}</strong>
      
    </div>
    <div class="score-chips">
      <div class="chip"><span class="chip-val">${p.groupScore}</span><span class="chip-lbl">Grup</span></div>
      <div class="chip"><span class="chip-val">${p.koScore}</span><span class="chip-lbl">Eleme</span></div>
      <div class="chip total"><span class="chip-val">${p.total}</span><span class="chip-lbl">Toplam</span></div>
    </div>
  </div>`;

  // ════════════════════════════════
  // GROUP STAGE
  // ════════════════════════════════
  h+=`<div class="section-title">Grup Aşaması Tahminleri</div>`;

  if(!adminGR){
    h+=`<div class="no-admin-notice">⚠️ Gerçek grup sonuçları henüz girilmemiş (FIFA2026ADMIN). Puan hesaplaması yapılamıyor.</div>`;
  }

  h+=`<div class="legend">
    <div class="legend-item"><span class="legend-dot dot-exact"></span>Tam doğru (+4 puan)</div>
    <div class="legend-item"><span class="legend-dot" style="background:#f39c12"></span>1 fark (+3)</div>
    <div class="legend-item"><span class="legend-dot" style="background:#e67e22"></span>2 fark (+2)</div>
    <div class="legend-item"><span class="legend-dot" style="background:#8e44ad"></span>3 fark (+1)</div>
    <div class="legend-item"><span class="legend-dot dot-wrong"></span>4 fark (0 puan)</div>
    <div class="legend-item"><span class="legend-dot dot-actual"></span>Gerçek sonuç</div>
  </div>`;

  h+=`<div class="group-grid">`;
  GROUP_KEYS.forEach(key=>{
    const userTeams  = p.groupRanks[key]||[];
    const adminTeams = adminGR ? (adminGR[key]||[]) : [];

    // Calculate group points
    let groupCardPts=0;
    if(adminGR){
      userTeams.forEach((team,ui)=>{
        const ai=adminTeams.indexOf(team);
        if(ai!==-1) groupCardPts+=groupPts(ui,ai);
      });
    }

    h+=`<div class="group-card">
      <div class="group-card-hdr">
        <span class="gc-label">GRUP ${key}</span>
        <span class="gc-nick">${GROUP_NICKNAMES[key]||''}</span>
        ${adminGR?`<span class="gc-pts">${groupCardPts}</span>`:''}
      </div>
      <div class="group-cols">
        <span></span><span>Tahmin</span><span>Gerçek</span>
      </div>`;

    for(let i=0;i<4;i++){
      const userTeam  = userTeams[i]  || '';
      const adminTeam = adminTeams[i] || '';
      const posClass  = ['p1','p2','p3','p4'][i];

      // Find where userTeam is in admin ranking (for pts)
      let pts=null, rowClass='';
      if(adminGR && userTeam){
        const adminIdxOfUser = adminTeams.indexOf(userTeam);
        if(adminIdxOfUser!==-1){
          pts = groupPts(i, adminIdxOfUser);
          rowClass = pts===4?'exact': pts===3?'close': pts===2?'close': pts===1?'close': 'wrong';
        } else {
          rowClass='wrong'; pts=0;
        }
      }

      const ptsBadge = pts!==null
        ? `<span class="pts-badge pts-${pts}">${pts>0?'+':''}${pts}</span>`
        : '';

      const diffLabel = (adminGR && userTeam && adminTeam && adminTeam!==userTeam)
        ? `<span class="actual-name">${esc(adminTeam)}</span>`
        : (adminGR && adminTeam && !userTeam ? `<span class="actual-name">${esc(adminTeam)}</span>` : '');

      h+=`<div class="gc-row ${rowClass}">
        <span class="gc-pos ${posClass}">${i+1}</span>
        <div class="gc-team">${flagEl(userTeam)}<span>${esc(userTeam)||'—'}</span>${ptsBadge}</div>
        <div class="gc-actual">${diffLabel}</div>
      </div>`;
    }
    h+=`</div>`; // group-card
  });
  h+=`</div>`; // group-grid

  // ════════════════════════════════
  // KO ROUND
  // ════════════════════════════════
  h+=`<div class="section-title">Eleme Turu Tahminleri</div>`;

  if(!p.koData){
    h+=`<div class="ko-no-entry">Bu katılımcı eleme turu tahmini girmemiş.</div>`;
    return h;
  }
  if(!adminKO){
    h+=`<div class="no-admin-notice">⚠️ Gerçek eleme turu sonuçları henüz girilmemiş (FIFA2026ADMIN). Puan hesaplaması yapılamıyor.</div>`;
  }

  h+=`<div class="legend" style="margin-bottom:0.75rem;">
    <div class="legend-item"><span class="ko-icon">✅</span>Doğru tahmin</div>
    <div class="legend-item"><span class="ko-icon">❌</span>Yanlış tahmin</div>
    <div class="legend-item"><span class="legend-dot dot-actual"></span>Gerçek kazanan</div>

  </div>`;

  h+=`<div class="ko-section">`;

  KO_ROUNDS.forEach((rn,ri)=>{
    const count     = KO_ROUND_COUNTS[ri];
    const ptsEach   = KO_PTS_MAP[rn];
    const userPicks = p.koData[rn]||[];
    const adminPicks= adminKO?(adminKO[rn]||[]):[];

    let roundPts=0;
    if(adminKO) adminPicks.forEach((aw,i)=>{ if(aw&&userPicks[i]&&aw===userPicks[i]) roundPts+=ptsEach; });

    h+=`<div class="ko-round-block">
      <div class="ko-round-title">
        ${KO_ROUND_LABELS[rn]}
        <span style="font-size:0.65rem;color:var(--muted);">(doğru = +${ptsEach} puan)</span>
        ${adminKO?`<span class="ko-round-pts">${roundPts} puan</span>`:''}
      </div>
      <div class="ko-matches-grid">`;

    for(let m=0;m<count;m++){
      const userW  = userPicks[m]||'';
      const adminW = adminKO ? (adminPicks[m]||'') : '';
      const isCorrect = adminW && userW && adminW===userW;
      const isWrong   = adminW && userW && adminW!==userW;
      const isPending = !adminW;
      const cardCls   = isCorrect?'correct': isWrong?'wrong': 'pending';
      const icon      = isCorrect?'✅': isWrong?'❌': '⏳';

      // For R32 show the fixture slots
      const fixLabel = rn==='R32' && R16_FIXTURES[m]
        ? `<span style="color:var(--muted);font-size:0.65rem">${R16_FIXTURES[m][0]} vs ${R16_FIXTURES[m][1]}</span>`
        : '';

      h+=`<div class="ko-match-card ${cardCls}">
        <div class="ko-match-num">M${m+1} ${fixLabel}</div>
        <div class="ko-prediction"><span class="ko-icon">${icon}</span>${esc(userW)||'—'}</div>
        ${adminW && adminW!==userW ? `<div class="ko-actual">→ ${esc(adminW)}</div>` : ''}
        ${adminW && adminW===userW ? `<div class="ko-actual" style="color:var(--green)">+${ptsEach} puan</div>` : ''}
      </div>`;
    }
    h+=`</div></div>`; // ko-matches-grid, ko-round-block
  });

  // Special matches
  const tp    = p.koData.ThirdPlace||'';
  const ch    = p.koData.Champion||'';
  const adminTp = adminKO?(adminKO.ThirdPlace||''):'';
  const adminCh = adminKO?(adminKO.Champion||''):'';

  h+=`<div class="special-row">
    <div class="special-card ${adminTp&&tp&&adminTp===tp?'correct':adminTp&&tp?'wrong':''}">
      <div class="special-title">3.ncü <span class="special-pts">${adminTp&&tp&&adminTp===tp?'+'+KO_PTS_MAP.ThirdPlace+' puan':''}</span></div>
      <div class="special-pick">${tp?esc(tp):'—'} ${adminTp&&tp&&adminTp===tp?'✅':adminTp&&tp?'❌':''}</div>
      ${adminTp&&tp&&adminTp!==tp?`<div class="special-actual">Gerçek: ${esc(adminTp)}</div>`:''}
    </div>
    <div class="special-card champion ${adminCh&&ch&&adminCh===ch?'correct':adminCh&&ch?'wrong':''}">
      <div class="special-title">Şampiyon <span class="special-pts">${adminCh&&ch&&adminCh===ch?'+'+KO_PTS_MAP.Champion+' puan':''}</span></div>
      <div class="special-pick">${ch?esc(ch):'—'} ${adminCh&&ch&&adminCh===ch?'✅':adminCh&&ch?'❌':''}</div>
      ${adminCh&&ch&&adminCh!==ch?`<div class="special-actual">Gerçek: ${esc(adminCh)}</div>`:''}
    </div>
  </div>`;

  h+=`</div>`; // ko-section
  return h;
}

load();
</script>
</body>
</html>
