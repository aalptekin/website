<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Click the Spots</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      /* Mobile: prevent scrolling/zooming gestures interfering with taps */
      touch-action: none;
    }
    #img {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
      /* Mobile: make the image the gesture surface */
      touch-action: none;
    }
    #status {
      position: fixed;
      left: 12px;
      bottom: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font: 14px/1.3 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      max-width: min(520px, calc(100vw - 24px));
      display: none;
      z-index: 10;
      pointer-events: none;
    }
    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 6px 10px;
      background: rgba(0, 0, 0, 0.65);
      color: #00ff88;
      font-family: monospace;
      font-size: 13px;
      border-radius: 6px;
      z-index: 20;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <img id="img" src="image.jpg" alt="Full Page Image" />
  <div id="debug">X: –, Y: –</div>
  <div id="status"></div>

  <script>
    // --- Config ---
    const COORDS_FILE = "coordinates.txt";
    const WINNER_PAGE = "winner.html";
    const BYE_PAGE = "bye.html";
    const HIT_RADIUS_PX = 20;

    let targets = [];  // [{x,y,found:false}, {x,y,found:false}]
    let ready = false;

    const img = document.getElementById("img");
    const statusEl = document.getElementById("status");
    const debugEl = document.getElementById("debug");

    function grantWinnerAccess() {
      const token = (crypto.randomUUID ? crypto.randomUUID() : String(Math.random()).slice(2));
      sessionStorage.setItem("WINNER_TOKEN", token);
    }

    function showStatus(msg) {
      statusEl.textContent = msg;
      statusEl.style.display = "block";
    }

    function hideStatus() {
      statusEl.style.display = "none";
      statusEl.textContent = "";
    }

    function parseCoordinates(text) {
      const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
      const pts = [];
      for (const line of lines) {
        const parts = line.split(/[,\s]+/).filter(Boolean);
        if (parts.length < 2) continue;
        const x = Number(parts[0]);
        const y = Number(parts[1]);
        if (Number.isFinite(x) && Number.isFinite(y)) pts.push({ x, y, found: false });
      }
      return pts;
    }

    async function loadTargets() {
      try {
        const res = await fetch(COORDS_FILE, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const text = await res.text();
        const pts = parseCoordinates(text);

        if (pts.length < 2) {
          throw new Error(`Need at least 2 coordinate pairs, found ${pts.length}`);
        }

        targets = [pts[0], pts[1]];
        ready = true;
        hideStatus();
      } catch (err) {
        ready = false;
        console.error("Koordinatları yüklemede hata oluştu:", err);
        showStatus("Koordinatlar yüklenemedi. Lütfen sayfayı bir web sunucusu üzerinden açın.");
      }
    }

    function getOriginalImagePointFromClientXY(clientX, clientY) {
      // Translate client (viewport) coords to ORIGINAL image coords with object-fit: cover handling
      const rect = img.getBoundingClientRect();

      const clickX = clientX - rect.left;
      const clickY = clientY - rect.top;

      const iw = img.naturalWidth;
      const ih = img.naturalHeight;

      const ew = rect.width;
      const eh = rect.height;

      const scale = Math.max(ew / iw, eh / ih);
      const scaledW = iw * scale;
      const scaledH = ih * scale;

      const offsetX = (scaledW - ew) / 2;
      const offsetY = (scaledH - eh) / 2;

      const xInScaled = clickX + offsetX;
      const yInScaled = clickY + offsetY;

      return { x: xInScaled / scale, y: yInScaled / scale };
    }

    function dist(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function allFound() {
      return targets.length === 2 && targets.every(t => t.found);
    }

    function updateDebugFromClientXY(clientX, clientY) {
      if (!img.naturalWidth) return;
      const p = getOriginalImagePointFromClientXY(clientX, clientY);
      debugEl.textContent = `X: ${Math.round(p.x)}, Y: ${Math.round(p.y)}`;
    }

    // MOBILE + DESKTOP unified tap/click handler
    function onPointerDown(evt) {
      // Prevent mobile from also firing compatibility mouse/click events
      evt.preventDefault();

      if (!ready) return;

      const p = getOriginalImagePointFromClientXY(evt.clientX, evt.clientY);

      // debug update on tap too
      debugEl.textContent = `X: ${Math.round(p.x)}, Y: ${Math.round(p.y)}`;

      // match an unfound target within tolerance
      let matchedIndex = -1;
      for (let i = 0; i < targets.length; i++) {
        if (targets[i].found) continue;
        if (dist(p, targets[i]) <= HIT_RADIUS_PX) {
          matchedIndex = i;
          break;
        }
      }

      if (matchedIndex >= 0) {
        targets[matchedIndex].found = true;

        if (allFound()) {
          grantWinnerAccess();
          sessionStorage.setItem("ALLOW_AUDIO", "1");
          window.location.href = WINNER_PAGE;
        }
        return;
      }

      sessionStorage.setItem("ALLOW_AUDIO", "1");
      window.location.href = BYE_PAGE;
    }

    // Desktop-only mousemove debug; on mobile we’ll update on touch/pointer moves
    function onPointerMove(evt) {
      // Works for mouse + touch + pen
      updateDebugFromClientXY(evt.clientX, evt.clientY);
    }

    img.addEventListener("load", loadTargets);
    if (img.complete && img.naturalWidth) loadTargets();

    // Bind to the image only (so taps anywhere on image count)
    img.addEventListener("pointerdown", onPointerDown, { passive: false });
    img.addEventListener("pointermove", onPointerMove, { passive: true });

    // If you still want desktop mousemove everywhere, you can keep this:
    // document.addEventListener("mousemove", e => updateDebugFromClientXY(e.clientX, e.clientY), { passive: true });
  </script>
</body>
</html>
